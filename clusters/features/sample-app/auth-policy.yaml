apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: sample-app-auth
  namespace: sample-app
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: sample-app
  rules:
    authentication:
      api-key-users:
        apiKey:
          selector:
            matchLabels:
              app: sample-app-api
          allNamespaces: true
        credentials:
          authorizationHeader:
            prefix: APIKEY
    authorization:
      allow-all:
        opa:
          rego: "allow = true"
    response:
      unauthenticated:
        headers:
          content-type:
            value: application/json
        body:
          value: |
            {"error": "Unauthorized", "message": "A valid API key is required. Pass it via: Authorization: APIKEY <your-key>"}
