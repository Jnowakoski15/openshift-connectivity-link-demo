apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: sample-app
  labels:
    app: httpbin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  selector:
    app: httpbin
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
